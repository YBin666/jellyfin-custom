<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ShortVideo Dev - Jellyfin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #root { width: 100%; height: 100%; }
    .dev-toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 50px;
      background: #1a1a1a; border-bottom: 1px solid #333;
      display: flex; align-items: center; gap: 12px; padding: 0 16px;
      z-index: 99999; color: #fff; font-size: 13px;
    }
    .dev-toolbar select, .dev-toolbar button {
      padding: 6px 12px; border-radius: 4px; border: 1px solid #444;
      background: #2a2a2a; color: #fff; font-size: 13px; cursor: pointer;
    }
    .dev-toolbar button:hover { background: #3a3a3a; }
    .dev-toolbar .label { opacity: 0.7; }
    .dev-toolbar input[type="text"] {
      padding: 6px 12px; border-radius: 4px; border: 1px solid #444;
      background: #2a2a2a; color: #fff; font-size: 13px; width: 220px;
    }
    .dev-status { margin-left: auto; padding: 4px 8px; border-radius: 4px; background: #2a2a2a; font-size: 11px; }
    .dev-status.ok { color: #4ade80; }
    .dev-status.err { color: #f87171; }
    #devRoot { position: fixed; top: 50px; left: 0; right: 0; bottom: 0; overflow: hidden; }
  </style>
</head>
<body>
  <div class="dev-toolbar">
    <span class="label">页面:</span>
    <select id="pageSelect" title="选择页面"></select>
      <option value="shorts">短视频</option>
      <option value="diy">DIY</option>
    </select>
    <span class="label">Token:</span>
    <input type="text" id="tokenInput" placeholder="输入 Jellyfin Access Token" />
    <span class="label">UserId:</span>
    <input type="text" id="userIdInput" placeholder="输入 User ID" />
    <button id="saveBtn">保存</button>
    <button id="reloadBtn">重载</button>
    <span class="dev-status" id="status">未连接</span>
  </div>
  <div id="devRoot"></div>
  <script type="module" src="/src/main-dev.jsx"></script>
</body>
</html>
