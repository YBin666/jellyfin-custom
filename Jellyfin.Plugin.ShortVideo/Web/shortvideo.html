<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>短视频</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <style>
        /* 竖屏全屏容器，抖音式上下滑动 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, "Segoe UI", sans-serif;
            -webkit-user-select: none; user-select: none;
        }
        .feed {
            width: 100%; height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }
        .card {
            width: 100%; height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        video {
            max-width: 100%; max-height: 100%;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
        }
        /* 封面图占位 */
        .poster {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-color: #000;
            z-index: 1;
            transition: opacity 0.3s ease;
        }
        .poster.hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* 加载动画 */
        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        .loader.show { display: block; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        /* 右侧操作栏 */
        .actions {
            position: absolute; right: 12px; bottom: 100px;
            display: flex; flex-direction: column; gap: 18px;
            color: #fff; font-size: 12px; text-align: center;
        }
        .actions .icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,.12);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer;
        }
        /* 底部标题 */
        .caption {
            position: absolute; left: 12px; right: 80px; bottom: 24px;
            color: #fff; font-size: 14px; line-height: 1.4;
            text-shadow: 0 1px 3px rgba(0,0,0,.8);
        }
        .caption .title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        /* 顶部返回 */
        .back {
            position: absolute; top: 16px; left: 16px; z-index: 10;
            color: #fff; font-size: 24px; text-decoration: none;
            text-shadow: 0 1px 3px rgba(0,0,0,.8);
        }
        .empty {
            color: #888; text-align: center; padding: 40px;
        }
    </style>
</head>
<body>
    <a class="back" href="/web/index.html">‹</a>
    <div class="feed" id="feed"></div>

    <script>
        // __APIKEY__ 和 __BASEURL__ 由服务端 Controller 替换
        var SERVER_API_KEY = "__APIKEY__";
        var BASE = "__BASEURL__";
        var feed = document.getElementById('feed');
        var firstBatchLoaded = false;
        var isLoading = false;

        // 从多种来源提取 Jellyfin 认证 token
        function resolveToken() {
            // 1. URL 参数 api_key（导航按钮带过来的，最可靠）
            var urlParam = new URLSearchParams(location.search).get('api_key');
            if (urlParam && urlParam.length >= 10) {
                console.log('[ShortVideo] token from URL param');
                return urlParam;
            }

            // 2. 服务端注入的 token（Controller 从请求中提取的）
            if (SERVER_API_KEY && SERVER_API_KEY !== '__APIKEY__' && SERVER_API_KEY.length >= 10) {
                console.log('[ShortVideo] token from server injection');
                return SERVER_API_KEY;
            }

            // 3. Cookie
            var m = document.cookie.match(/X-Emby-Token=([^;]+)/i);
            if (m && m[1].length >= 10) {
                console.log('[ShortVideo] token from cookie');
                return m[1];
            }

            // 4. localStorage 精确查找（只在 JSON 对象中找 AccessToken 字段，不匹配原始字符串）
            try {
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    var v = localStorage.getItem(k);
                    if (!v || v.charAt(0) !== '{') continue; // 只解析 JSON 对象
                    try {
                        var parsed = JSON.parse(v);
                        if (parsed && typeof parsed === 'object') {
                            var found = findTokenInObject(parsed);
                            if (found) {
                                console.log('[ShortVideo] token from localStorage key:', k);
                                return found;
                            }
                        }
                    } catch (e2) {}
                }
            } catch (e3) {
                console.warn('[ShortVideo] localStorage scan failed:', e3);
            }

            console.warn('[ShortVideo] No token found! localStorage keys:', Object.keys(localStorage));
            return '';
        }

        // 递归在 JSON 对象里找 AccessToken 字段（精确匹配字段名，避免误匹配设备 ID）
        function findTokenInObject(obj, depth) {
            if (!obj || typeof obj !== 'object' || depth > 5) return null;
            depth = depth || 0;
            var keys = Object.keys(obj);
            for (var i = 0; i < keys.length; i++) {
                var k = keys[i];
                var v = obj[k];
                if (!v) continue;
                if (typeof v === 'string') {
                    var kl = k.toLowerCase();
                    // 只匹配精确的字段名，且值长度合理（Jellyfin token 通常是 32 位 hex）
                    if (kl === 'accesstoken' && v.length >= 16 && v.length <= 64) {
                        return v;
                    }
                }
                if (typeof v === 'object' && !Array.isArray(v)) {
                    var sub = findTokenInObject(v, depth + 1);
                    if (sub) return sub;
                }
            }
            return null;
        }

        var API_KEY = resolveToken();
        console.log('[ShortVideo] API_KEY resolved:', API_KEY ? 'YES (' + API_KEY.length + ' chars)' : 'NO');

        function apiUrl(path) {
            var url = BASE + path;
            if (API_KEY) {
                var sep = path.indexOf('?') >= 0 ? '&' : '?';
                url += sep + 'api_key=' + encodeURIComponent(API_KEY);
            }
            return url;
        }

        // 拉取一批并渲染
        function loadBatch() {
            if (isLoading) return;
            isLoading = true;
            fetch(apiUrl('/ShortVideo/NextBatch'), { credentials: 'include' })
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (items) {
                    isLoading = false;
                    console.log('[ShortVideo] NextBatch response:', items);
                    if (!items || items.length === 0) {
                        if (!firstBatchLoaded) {
                            feed.innerHTML = '<div class="empty">没有找到短视频。<br/>请在仪表盘 → 插件 → ShortVideo 检查时长配置，并确认媒体库中有短视频文件。</div>';
                        }
                        return;
                    }
                    var isFirst = !firstBatchLoaded;
                    items.forEach(appendCard);
                    firstBatchLoaded = true;
                    // 首批加载完成后，触发 playVisible 来初始化并播放第一条
                    if (isFirst) {
                        setTimeout(function () {
                            playVisible();
                        }, 200);
                    }
                })
                .catch(function (e) {
                    isLoading = false;
                    console.error(e);
                    if (!firstBatchLoaded) {
                        feed.innerHTML = '<div class="empty">加载失败：' + e.message + '<br/>请确认 api_key 正确。</div>';
                    }
                });
        }

        function appendCard(item) {
            console.log('[ShortVideo] appendCard item keys:', Object.keys(item));
            var card = document.createElement('div');
            card.className = 'card';
            card.dataset.id = item.id || item.Id || '';

            // 兼容不同 JSON 序列化风格（camelCase / PascalCase）
            var streamUrl = item.streamUrl || item.StreamUrl || '';
            var name = item.name || item.Name || '';
            var duration = item.durationSeconds || item.DurationSeconds || 0;
            var videoCodec = (item.videoCodec || item.VideoCodec || '').toLowerCase();
            var audioCodec = (item.audioCodec || item.AudioCodec || '').toLowerCase();
            var container = (item.container || item.Container || '').toLowerCase();

            if (!streamUrl) {
                console.warn('[ShortVideo] item has no streamUrl:', item);
                return;
            }

            // 拼接完整流地址
            var src = streamUrl.indexOf('http') === 0
                ? streamUrl
                : BASE + streamUrl;

            // 构建 HLS 转码回退 URL：/Videos/{id}/main.m3u8
            // 保留原有所有 query 参数（包括 api_key），再追加转码编码参数
            var transcodeParams = '&VideoCodec=h264&AudioCodec=aac&VideoBitrate=4000000&AudioBitrate=192000';
            var hlsSrc = src.replace(/\/stream\?(.*)/, '/main.m3u8?$1' + transcodeParams);
            // 如果上面的正则没匹配上（URL 格式不同），手动构建
            if (hlsSrc === src) {
                var id = card.dataset.id;
                if (id) {
                    hlsSrc = BASE + '/Videos/' + id + '/main.m3u8?api_key=' + encodeURIComponent(API_KEY) + transcodeParams;
                }
            }

            card.innerHTML =
                '<div class="poster"></div>' +
                '<div class="loader"></div>' +
                '<video preload="metadata" playsinline webkit-playsinline></video>' +
                '<div class="caption"><div class="title"></div><div class="dur"></div></div>' +
                '<div class="actions">' +
                  '<div class="icon like" title="点赞">♡</div>' +
                  '<div class="icon mute" title="静音">🔊</div>' +
                '</div>';

            card.querySelector('.title').textContent = name;
            card.querySelector('.dur').textContent = Math.round(duration) + 's';

            // 设置封面图
            var posterEl = card.querySelector('.poster');
            var loaderEl = card.querySelector('.loader');
            var posterUrl = BASE + '/Items/' + card.dataset.id + '/Images/Primary?fillHeight=1080&fillWidth=720&quality=80';
            posterEl.style.backgroundImage = 'url("' + posterUrl + '")';

            var v = card.querySelector('video');
            var initialized = false;
            var triedTranscode = false;
            var hls = null;
            var isLoading = false;

            function showLoading() {
                loaderEl.classList.add('show');
                posterEl.classList.remove('hidden');
            }
            function hideLoading() {
                loaderEl.classList.remove('show');
                posterEl.classList.add('hidden');
            }

            // 检测浏览器是否支持该视频编码
            function isVideoCodecSupported(codec) {
                if (!codec) return null; // 未知，让前端自己试
                // 常见浏览器普遍支持的编码
                var supported = ['h264', 'avc', 'avc1', 'mpeg4', 'mp4v'];
                // vp8/vp9 在 Chrome/Firefox 支持，Safari 部分支持
                if (codec === 'vp8' || codec === 'vp9') {
                    try {
                        return v.canPlayType('video/webm; codecs=' + codec) !== '';
                    } catch (e) { return false; }
                }
                // hevc/h265 只有部分浏览器（Safari、Edge 硬件加速）支持
                if (codec === 'hevc' || codec === 'h265') {
                    try {
                        return v.canPlayType('video/mp4; codecs=hev1') !== ''
                            || v.canPlayType('video/mp4; codecs=hvc1') !== '';
                    } catch (e) { return false; }
                }
                // av1 较新，部分浏览器支持
                if (codec === 'av1' || codec === 'av01') {
                    try {
                        return v.canPlayType('video/mp4; codecs=av01.0.05M.08') !== '';
                    } catch (e) { return false; }
                }
                // mpeg2、msmpeg4 等老格式浏览器基本不支持
                if (codec.indexOf('mpeg2') >= 0 || codec.indexOf('msmpeg4') >= 0
                    || codec === 'wmv3' || codec === 'wmv2' || codec === 'vc1') {
                    return false;
                }
                return supported.indexOf(codec) >= 0;
            }

            // 检测浏览器是否支持该音频编码
            function isAudioCodecSupported(codec) {
                if (!codec) return null;
                var supported = ['aac', 'mp3', 'mp2', 'opus', 'vorbis', 'flac', 'pcm'];
                // ac3/eac3/dts 浏览器基本不支持
                if (codec === 'ac3' || codec === 'eac3' || codec === 'dts' || codec === 'truehd') {
                    return false;
                }
                return supported.indexOf(codec) >= 0;
            }

            // 判断是否应该直接走转码（编码不支持或容器不支持）
            function shouldDirectStream() {
                var videoOk = isVideoCodecSupported(videoCodec);
                var audioOk = isAudioCodecSupported(audioCodec);
                // 只要有一个明确不支持，就走转码
                if (videoOk === false || audioOk === false) {
                    return false;
                }
                // 常见不支持直链播放的容器格式
                var unsupportedContainers = ['avi', 'mkv', 'mov', 'wmv', 'flv', 'rmvb', 'rm', 'ts', 'm2ts'];
                if (container && unsupportedContainers.indexOf(container) >= 0) {
                    return false;
                }
                // 未知或都支持，尝试直链
                return true;
            }

            var useTranscode = !shouldDirectStream();
            console.log('[ShortVideo] codec check:', {
                name: name,
                videoCodec: videoCodec || '(unknown)',
                audioCodec: audioCodec || '(unknown)',
                container: container || '(unknown)',
                useTranscode: useTranscode
            });

            function initPlayer() {
                if (initialized) return;
                initialized = true;
                showLoading();
                if (useTranscode && hlsSrc) {
                    // 编码不支持，直接用 HLS 转码，跳过直链尝试
                    console.log('[ShortVideo] direct stream skipped (unsupported codec), using HLS transcode directly');
                    triedTranscode = true;
                    fallbackToHls();
                } else {
                    // 先尝试直接播放原始文件（MP4/WebM 等浏览器支持的格式，零开销）
                    v.src = src;
                    v.load();
                }
            }

            // 视频开始播放时隐藏封面和加载动画
            v.addEventListener('playing', function () {
                hideLoading();
            });
            v.addEventListener('waiting', function () {
                showLoading();
            });

            function destroyPlayer() {
                if (hls) {
                    try { hls.destroy(); } catch (e) {}
                    hls = null;
                }
                v.pause();
                v.removeAttribute('src');
                v.load();
                initialized = false;
                triedTranscode = false;
                showLoading();
            }

            // 视频加载失败时自动回退到 HLS 转码流
            v.addEventListener('error', function () {
                if (!triedTranscode && hlsSrc && hlsSrc !== src) {
                    triedTranscode = true;
                    console.warn('[ShortVideo] direct stream error, falling back to HLS transcode:', src);
                    fallbackToHls();
                }
            });

            // 检测"有声音无画面"：元数据加载后检查 videoWidth
            // 如果视频轨道无法被浏览器解码，videoWidth/videoHeight 会是 0
            v.addEventListener('loadedmetadata', function () {
                if (triedTranscode) return;
                var w = v.videoWidth || 0;
                var h = v.videoHeight || 0;
                console.log('[ShortVideo] loadedmetadata: videoWidth=' + w + ', videoHeight=' + h);
                if (w === 0 || h === 0) {
                    // 视频轨道无法解码（只有音频），触发回退
                    triedTranscode = true;
                    console.warn('[ShortVideo] no video track detected (only audio), falling back to HLS transcode');
                    fallbackToHls();
                }
            });

            // 兜底：播放 2 秒后再检查一次画面（某些格式可能延迟解析视频轨）
            v.addEventListener('play', function () {
                if (triedTranscode) return;
                setTimeout(function () {
                    if (triedTranscode) return;
                    var w = v.videoWidth || 0;
                    var h = v.videoHeight || 0;
                    if (w === 0 || h === 0) {
                        triedTranscode = true;
                        console.warn('[ShortVideo] 2s after play still no video, falling back to HLS transcode');
                        fallbackToHls();
                    }
                }, 2000);
            });

            function fallbackToHls() {
                // 先清掉原来的
                v.pause();
                v.removeAttribute('src');

                // Safari 原生支持 HLS，直接用 src
                if (v.canPlayType('application/vnd.apple.mpegurl')) {
                    v.src = hlsSrc;
                    v.load();
                    v.play().catch(function () {});
                    return;
                }

                // 其他浏览器用 hls.js
                if (window.Hls && Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: false,
                        backBufferLength: 60
                    });
                    hls.loadSource(hlsSrc);
                    hls.attachMedia(v);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        v.play().catch(function () {});
                    });
                    hls.on(Hls.Events.ERROR, function (event, data) {
                        console.error('[ShortVideo] HLS error:', data.type, data.details);
                    });
                } else {
                    console.warn('[ShortVideo] HLS not supported and no hls.js available');
                }
            }

            card._initPlayer = initPlayer;
            card._destroyPlayer = destroyPlayer;
            card._video = v;
            card._useTranscode = useTranscode;
            card._hlsSrc = hlsSrc;
            card._src = src;
            card._prefetched = false;

            // 预加载：触发转码启动，让 FFmpeg 先开始生成分片
            // 对 HLS 转码：请求 m3u8 文件就能触发 FFmpeg 启动
            // 对直链视频：设置 preload=auto 预加载
            card._prefetch = function () {
                if (card._prefetched) return;
                card._prefetched = true;
                console.log('[ShortVideo] prefetching:', name);
                if (useTranscode && hlsSrc) {
                    // 请求 m3u8 播放列表，触发 FFmpeg 转码进程启动
                    // 不用等响应，发出去就行
                    fetch(hlsSrc, { method: 'GET' })
                        .then(function (resp) {
                            console.log('[ShortVideo] prefetch m3u8 fetched:', name, resp.status);
                        })
                        .catch(function () {
                            // 失败也没关系，正式播放时会重新请求
                        });
                } else {
                    // 直链视频：设置 preload=auto 预加载元数据和开头
                    if (v.preload !== 'auto') {
                        v.preload = 'auto';
                        v.load();
                    }
                }
            };

            // 交互：点击播放/暂停
            v.addEventListener('click', function () {
                if (v.paused) v.play(); else v.pause();
            });
            // 静音切换
            card.querySelector('.mute').addEventListener('click', function () {
                v.muted = !v.muted;
                this.textContent = v.muted ? '🔈' : '🔊';
            });
            // 点赞（仅视觉）
            card.querySelector('.like').addEventListener('click', function () {
                this.textContent = this.textContent === '♥' ? '♡' : '♥';
            });

            feed.appendChild(card);
        }

        // 监听滚动，自动播放当前可见项 + 预加载
        var snapTimer;
        feed.addEventListener('scroll', function () {
            clearTimeout(snapTimer);
            snapTimer = setTimeout(function () {
                playVisible();
                // 接近底部时再拉一批
                if (feed.scrollTop + feed.clientHeight > feed.scrollHeight - feed.clientHeight) {
                    loadBatch();
                }
            }, 120);
        });

        function playVisible() {
            var cards = feed.querySelectorAll('.card');
            var center = feed.scrollTop + feed.clientHeight / 2;
            var visibleIndex = -1;
            for (var i = 0; i < cards.length; i++) {
                var card = cards[i];
                var top = card.offsetTop;
                var bottom = top + card.offsetHeight;
                if (center >= top && center < bottom) {
                    visibleIndex = i;
                    break;
                }
            }

            cards.forEach(function (card, i) {
                var v = card._video || card.querySelector('video');
                var isVisible = i === visibleIndex;
                if (isVisible) {
                    // 当前可见：初始化播放器并播放
                    if (card._initPlayer) card._initPlayer();
                    v.play().catch(function () { /* 自动播放策略可能拦截 */ });
                } else {
                    // 不可见：暂停
                    v.pause();
                    // 离得远的销毁播放器释放资源（前后各保留 2 个）
                    if (Math.abs(i - visibleIndex) > 2 && card._destroyPlayer) {
                        card._destroyPlayer();
                    }
                }
            });

            // 预加载：当前视频后面的 2 个视频提前触发转码
            if (visibleIndex >= 0) {
                for (var j = 1; j <= 2; j++) {
                    var nextIdx = visibleIndex + j;
                    if (nextIdx < cards.length && cards[nextIdx]._prefetch) {
                        cards[nextIdx]._prefetch();
                    }
                }
            }
        }

        // 键盘上下切换（桌面测试用）
        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                e.preventDefault();
                var step = feed.clientHeight;
                feed.scrollBy({ top: e.key === 'ArrowDown' ? step : -step, behavior: 'smooth' });
            }
        });

        // 启动
        loadBatch();
    </script>
</body>
</html>
