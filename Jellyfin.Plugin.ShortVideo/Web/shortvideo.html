<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>短视频</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .lucide {
            width: 20px;
            height: 20px;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            vertical-align: middle;
        }
        .icon .lucide,
        .btn-play .lucide,
        .btn-volume .lucide,
        .back .lucide {
            width: 24px;
            height: 24px;
        }
        .back .lucide {
            width: 28px;
            height: 28px;
        }
        .center-play-animation .lucide {
            width: 48px;
            height: 48px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .feed {
            width: 100%; height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }
        .card {
            width: 100%; height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        video {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            background: #000;
            pointer-events: none;
        }
        .video-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .poster {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-color: #000;
            z-index: 1;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .poster.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            pointer-events: none;
        }
        .loader.show { display: block; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .top-gradient {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 120px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index: 5;
            pointer-events: none;
        }
        .bottom-gradient {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 200px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            z-index: 5;
            pointer-events: none;
        }

        .actions {
            position: absolute; right: 12px; bottom: 120px;
            display: flex; flex-direction: column; gap: 20px;
            color: #fff; font-size: 12px; text-align: center;
            z-index: 10;
        }
        .actions .action-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .actions .icon {
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .actions .icon:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.25);
        }
        .actions .icon.like.liked {
            color: #ff4757;
            background: rgba(255,71,87,0.2);
        }
        .actions .count {
            font-size: 12px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            font-weight: 500;
        }

        .caption {
            position: absolute; left: 16px; right: 80px; bottom: 80px;
            color: #fff;
            z-index: 10;
        }
        .caption .title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 6px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            line-height: 1.4;
        }
        .caption .meta {
            font-size: 13px;
            opacity: 0.85;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .back {
            position: absolute; top: 16px; left: 16px; z-index: 20;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 28px;
            text-decoration: none;
            line-height: 1;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .back svg { display: block; }

        .empty {
            color: #888; text-align: center; padding: 40px;
        }

        .center-play-animation {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 36px;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .center-play-animation.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .heart-animation {
            position: absolute;
            pointer-events: none;
            z-index: 20;
            font-size: 80px;
            animation: heartPop 0.8s ease forwards;
        }
        @keyframes heartPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            40% { transform: translate(-50%, -50%) scale(0.95); }
            60% { transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) translateY(-30px); }
        }

        .controls {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            padding: 12px 16px 16px;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
        }
        .progress-container {
            position: relative;
            width: 100%;
            height: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-top: 4px;
        }
        .progress-bg {
            position: absolute;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
        }
        .progress-buffer {
            position: absolute;
            height: 3px;
            background: rgba(255,255,255,0.4);
            border-radius: 2px;
            width: 0;
        }
        .progress-played {
            position: absolute;
            height: 3px;
            background: #fff;
            border-radius: 2px;
            width: 0;
        }
        .progress-handle {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            transform: translateX(-50%) scale(0);
            transition: transform 0.15s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .progress-container:hover .progress-handle,
        .progress-container.dragging .progress-handle {
            transform: translateX(-50%) scale(1);
        }
        .progress-container:hover .progress-bg,
        .progress-container.dragging .progress-bg,
        .progress-container:hover .progress-buffer,
        .progress-container.dragging .progress-buffer,
        .progress-container:hover .progress-played,
        .progress-container.dragging .progress-played {
            height: 4px;
        }
        .controls-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
        }
        .controls-bar button {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease;
        }
        .controls-bar button:active {
            transform: scale(0.85);
        }
        .time-current, .time-total {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            min-width: 40px;
        }
        .time-separator {
            font-size: 13px;
            opacity: 0.6;
        }
        .spacer { flex: 1; }
        .playback-rate {
            font-size: 13px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            user-select: none;
            min-width: 40px;
            text-align: center;
            transition: background 0.15s ease;
        }
        .playback-rate:active {
            background: rgba(255,255,255,0.25);
        }
        .rate-menu {
            position: absolute;
            bottom: 50px;
            right: 16px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 80px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 30;
        }
        .rate-menu.show { display: flex; }
        .rate-menu .rate-option {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            color: #fff;
            transition: background 0.15s ease;
        }
        .rate-menu .rate-option:hover {
            background: rgba(255,255,255,0.1);
        }
        .rate-menu .rate-option.active {
            background: rgba(255,255,255,0.2);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <a class="back" href="/web/index.html"><i data-lucide="chevron-left"></i></a>
    <div class="feed" id="feed"></div>

    <script>
        var SERVER_API_KEY = "__APIKEY__";
        var BASE = "__BASEURL__";
        var feed = document.getElementById('feed');
        var firstBatchLoaded = false;
        var isLoading = false;

        function resolveToken() {
            var urlParam = new URLSearchParams(location.search).get('api_key');
            if (urlParam && urlParam.length >= 8) {
                console.log('[ShortVideo] token from URL param, len=' + urlParam.length);
                return urlParam;
            }
            if (SERVER_API_KEY && SERVER_API_KEY !== '__APIKEY__' && SERVER_API_KEY.length >= 8) {
                console.log('[ShortVideo] token from server injection, len=' + SERVER_API_KEY.length);
                return SERVER_API_KEY;
            }
            var m = document.cookie.match(/X-Emby-Token=([^;]+)/i);
            if (m && m[1] && m[1].length >= 8) {
                console.log('[ShortVideo] token from cookie, len=' + m[1].length);
                return decodeURIComponent(m[1]);
            }
            try {
                if (typeof ApiClient !== 'undefined') {
                    var t = '';
                    if (typeof ApiClient.accessToken === 'function') {
                        try { t = ApiClient.accessToken(); } catch(e) {}
                    } else if (ApiClient.accessToken) {
                        t = ApiClient.accessToken;
                    }
                    if (t && t.length >= 8) {
                        console.log('[ShortVideo] token from ApiClient, len=' + t.length);
                        return t;
                    }
                }
            } catch(e) {}
            try {
                var creds = JSON.parse(localStorage.getItem('jellyfin_credentials') || '{}');
                var servers = creds.Servers || [];
                for (var si = 0; si < servers.length; si++) {
                    var at = servers[si].AccessToken;
                    if (at && at.length >= 8) {
                        console.log('[ShortVideo] token from jellyfin_credentials, len=' + at.length);
                        return at;
                    }
                }
            } catch(e4) {
                console.warn('[ShortVideo] jellyfin_credentials parse failed:', e4);
            }
            try {
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    var v = localStorage.getItem(k);
                    if (!v) continue;
                    if (v.charAt(0) === '{') {
                        try {
                            var parsed = JSON.parse(v);
                            if (parsed && typeof parsed === 'object') {
                                var found = findTokenInObject(parsed);
                                if (found) {
                                    console.log('[ShortVideo] token from localStorage JSON key:', k, 'len=' + found.length);
                                    return found;
                                }
                            }
                        } catch (e2) {}
                    } else if (v.length >= 20 && v.length <= 200 && /^[A-Za-z0-9+/=_|.-]+$/.test(v)) {
                        var kl = k.toLowerCase();
                        if (kl.indexOf('token') >= 0 || kl.indexOf('access') >= 0 || kl.indexOf('apikey') >= 0 || kl.indexOf('api_key') >= 0) {
                            console.log('[ShortVideo] token from localStorage string key:', k, 'len=' + v.length);
                            return v;
                        }
                    }
                }
            } catch (e3) {
                console.warn('[ShortVideo] localStorage scan failed:', e3);
            }
            console.warn('[ShortVideo] No token found! localStorage keys=' + localStorage.length);
            return '';
        }

        function findTokenInObject(obj, depth) {
            if (!obj || typeof obj !== 'object' || (depth || 0) > 6) return null;
            depth = depth || 0;
            if (Array.isArray(obj)) {
                for (var i = 0; i < obj.length; i++) {
                    var sub = findTokenInObject(obj[i], depth + 1);
                    if (sub) return sub;
                }
                return null;
            }
            var keys = Object.keys(obj);
            for (var i = 0; i < keys.length; i++) {
                var k = keys[i];
                var v = obj[k];
                if (!v) continue;
                if (typeof v === 'string') {
                    var kl = k.toLowerCase();
                    if ((kl === 'accesstoken' || kl === 'token' || kl === 'apikey' || kl === 'api_key')
                        && v.length >= 10 && v.length <= 200) {
                        return v;
                    }
                }
                if (typeof v === 'object') {
                    var sub = findTokenInObject(v, depth + 1);
                    if (sub) return sub;
                }
            }
            return null;
        }

        var API_KEY = resolveToken();
        console.log('[ShortVideo] API_KEY resolved:', API_KEY ? 'YES (' + API_KEY.length + ' chars)' : 'NO');

        var globalMuted = true;
        var globalVolume = 1;

        var transcodePrefetchQueue = [];
        var transcodePrefetchActive = 0;
        var MAX_CONCURRENT_TRANSCODES = 2;

        function scheduleTranscodePrefetch(fn) {
            if (transcodePrefetchActive < MAX_CONCURRENT_TRANSCODES) {
                transcodePrefetchActive++;
                fn();
            } else {
                transcodePrefetchQueue.push(fn);
            }
        }

        function transcodePrefetchDone() {
            if (transcodePrefetchActive > 0) transcodePrefetchActive--;
            if (transcodePrefetchQueue.length > 0 && transcodePrefetchActive < MAX_CONCURRENT_TRANSCODES) {
                var next = transcodePrefetchQueue.shift();
                transcodePrefetchActive++;
                next();
            }
        }

        function apiUrl(path) {
            var url = BASE + path;
            if (API_KEY) {
                var sep = path.indexOf('?') >= 0 ? '&' : '?';
                url += sep + 'api_key=' + encodeURIComponent(API_KEY);
            }
            return url;
        }

        function syncMuteAll() {
            var cards = feed.querySelectorAll('.card');
            cards.forEach(function (card) {
                var v = card._video || card.querySelector('video');
                var muteBtn = card.querySelector('.mute-icon');
                if (v) {
                    v.muted = globalMuted;
                    v.volume = globalVolume;
                }
                var icon = globalMuted ? 'volume-x' : 'volume-2';
                if (muteBtn && muteBtn._setIcon) {
                    muteBtn._setIcon(icon);
                }
            });
        }

        function formatTime(seconds) {
            if (!isFinite(seconds) || seconds < 0) return '00:00';
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
        }

        function loadBatch() {
            if (isLoading) return;
            isLoading = true;
            fetch(apiUrl('/ShortVideo/NextBatch'), { credentials: 'include' })
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (items) {
                    isLoading = false;
                    console.log('[ShortVideo] NextBatch response:', items);
                    if (!items || items.length === 0) {
                        if (!firstBatchLoaded) {
                            feed.innerHTML = '<div class="empty">没有找到短视频。<br/>请在仪表盘 → 插件 → ShortVideo 检查时长配置，并确认媒体库中有短视频文件。</div>';
                        }
                        return;
                    }
                    var isFirst = !firstBatchLoaded;
                    items.forEach(appendCard);
                    firstBatchLoaded = true;
                    if (isFirst) {
                        setTimeout(function () {
                            playVisible();
                        }, 200);
                    }
                })
                .catch(function (e) {
                    isLoading = false;
                    console.error(e);
                    if (!firstBatchLoaded) {
                        feed.innerHTML = '<div class="empty">加载失败：' + e.message + '<br/>请确认 api_key 正确。</div>';
                    }
                });
        }

        function appendCard(item) {
            console.log('[ShortVideo] appendCard item keys:', Object.keys(item));
            var card = document.createElement('div');
            card.className = 'card';
            card.dataset.id = item.id || item.Id || '';

            var streamUrl = item.streamUrl || item.StreamUrl || '';
            var name = item.name || item.Name || '';
            var duration = item.durationSeconds || item.DurationSeconds || 0;
            var videoCodec = (item.videoCodec || item.VideoCodec || '').toLowerCase();
            var audioCodec = (item.audioCodec || item.AudioCodec || '').toLowerCase();
            var container = (item.container || item.Container || '').toLowerCase();

            if (!streamUrl) {
                console.warn('[ShortVideo] item has no streamUrl:', item);
                return;
            }

            function ensureApiKey(url, key) {
                if (key && key.length >= 10) {
                    if (url.indexOf('api_key=') >= 0) {
                        return url.replace(/([?&])api_key=[^&]*/, '$1api_key=' + encodeURIComponent(key));
                    }
                    var sep = url.indexOf('?') >= 0 ? '&' : '?';
                    return url + sep + 'api_key=' + encodeURIComponent(key);
                } else {
                    return url.replace(/([?&])api_key=[^&]*/, function(match, prefix) {
                        return prefix === '?' ? '?' : '';
                    }).replace(/\?$/, '').replace(/\?&/, '?');
                }
            }

            var src = streamUrl.indexOf('http') === 0
                ? streamUrl
                : BASE + streamUrl;
            src = ensureApiKey(src, API_KEY);

            var transcodeParams = 'VideoCodec=h264&AudioCodec=aac&VideoBitrate=4000000&AudioBitrate=192000';
            var hlsSrc = '';
            var streamMatch = src.match(/\/Videos\/([^/]+)\/stream\?(.*)/);
            if (streamMatch) {
                var videoIdMatch = streamMatch[1];
                var qs = streamMatch[2]
                    .replace(/(^|&)static=true&?/i, '$1')
                    .replace(/(^|&)api_key=[^&]*/i, '$1')
                    .replace(/^&+/, '').replace(/&+$/, '');
                hlsSrc = BASE + '/Videos/' + videoIdMatch + '/main.m3u8?'
                    + (qs ? qs + '&' : '')
                    + 'api_key=' + encodeURIComponent(API_KEY) + '&'
                    + transcodeParams;
            } else {
                var idForHls = card.dataset.id;
                if (idForHls) {
                    hlsSrc = BASE + '/Videos/' + idForHls + '/main.m3u8?api_key='
                        + encodeURIComponent(API_KEY) + '&' + transcodeParams;
                }
            }

            card.innerHTML =
                '<div class="top-gradient"></div>' +
                '<div class="bottom-gradient"></div>' +
                '<div class="poster"></div>' +
                '<div class="loader"></div>' +
                '<video preload="metadata" playsinline webkit-playsinline x-webkit-airplay="deny" disablepictureinpicture controlsList="nodownload noplaybackrate noremoteplayback" loop muted></video>' +
                '<div class="video-overlay"></div>' +
                '<div class="center-play-animation"><i data-lucide="play"></i></div>' +
                '<div class="caption">' +
                  '<div class="title"></div>' +
                  '<div class="meta"></div>' +
                '</div>' +
                '<div class="actions">' +
                  '<div class="action-item">' +
                    '<div class="icon like" title="点赞"><i data-lucide="heart"></i></div>' +
                    '<span class="count like-count">0</span>' +
                  '</div>' +
                  '<div class="action-item">' +
                    '<div class="icon mute-icon" title="静音"><i data-lucide="volume-x"></i></div>' +
                  '</div>' +
                '</div>' +
                '<div class="controls">' +
                  '<div class="controls-bar">' +
                    '<button class="btn-play"><i data-lucide="play"></i></button>' +
                    '<span class="time-current">00:00</span>' +
                    '<span class="time-separator">/</span>' +
                    '<span class="time-total">00:00</span>' +
                    '<div class="spacer"></div>' +
                    '<div class="playback-rate">1x</div>' +
                  '</div>' +
                  '<div class="progress-container">' +
                    '<div class="progress-bg"></div>' +
                    '<div class="progress-buffer"></div>' +
                    '<div class="progress-played"></div>' +
                    '<div class="progress-handle"></div>' +
                  '</div>' +
                  '<div class="rate-menu">' +
                    '<div class="rate-option" data-rate="0.5">0.5x</div>' +
                    '<div class="rate-option active" data-rate="1">1x</div>' +
                    '<div class="rate-option" data-rate="1.5">1.5x</div>' +
                    '<div class="rate-option" data-rate="2">2x</div>' +
                  '</div>' +
                '</div>';

            card.querySelector('.title').textContent = name;
            card.querySelector('.meta').textContent = Math.round(duration) + 's';

            var posterEl = card.querySelector('.poster');
            var loaderEl = card.querySelector('.loader');
            var posterUrl = BASE + '/Items/' + card.dataset.id + '/Images/Primary?fillHeight=1080&fillWidth=720&quality=80';
            posterEl.style.backgroundImage = 'url("' + posterUrl + '")';

            var v = card.querySelector('video');
            var initialized = false;
            var triedTranscode = false;
            var hls = null;
            var srcLoaded = false;
            var playRate = 1;
            var isDraggingProgress = false;
            var likeCount = Math.floor(Math.random() * 1000) + 100;
            var isLiked = false;

            var likeIcon = card.querySelector('.icon.like');
            var likeCountEl = card.querySelector('.like-count');
            var btnPlay = card.querySelector('.btn-play');
            var muteIcon = card.querySelector('.mute-icon');
            var timeCurrent = card.querySelector('.time-current');
            var timeTotal = card.querySelector('.time-total');
            var progressContainer = card.querySelector('.progress-container');
            var progressPlayed = card.querySelector('.progress-played');
            var progressBuffer = card.querySelector('.progress-buffer');
            var progressHandle = card.querySelector('.progress-handle');
            var rateBtn = card.querySelector('.playback-rate');
            var rateMenu = card.querySelector('.rate-menu');
            var centerAnim = card.querySelector('.center-play-animation');

            likeCountEl.textContent = formatLikeCount(likeCount);

            function formatLikeCount(n) {
                if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
                if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
                return n.toString();
            }

            function showLoading() {
                loaderEl.classList.add('show');
                posterEl.classList.remove('hidden');
            }
            function hideLoading() {
                loaderEl.classList.remove('show');
                posterEl.classList.add('hidden');
            }

            function isVideoCodecSupported(codec) {
                if (!codec) return null;
                var supported = ['h264', 'avc', 'avc1', 'mpeg4', 'mp4v'];
                if (codec === 'vp8' || codec === 'vp9') {
                    try { return v.canPlayType('video/webm; codecs=' + codec) !== ''; }
                    catch (e) { return false; }
                }
                if (codec === 'hevc' || codec === 'h265') {
                    try {
                        return v.canPlayType('video/mp4; codecs=hev1') !== ''
                            || v.canPlayType('video/mp4; codecs=hvc1') !== '';
                    } catch (e) { return false; }
                }
                if (codec === 'av1' || codec === 'av01') {
                    try { return v.canPlayType('video/mp4; codecs=av01.0.05M.08') !== ''; }
                    catch (e) { return false; }
                }
                if (codec.indexOf('mpeg2') >= 0 || codec.indexOf('msmpeg4') >= 0
                    || codec === 'wmv3' || codec === 'wmv2' || codec === 'vc1') {
                    return false;
                }
                return supported.indexOf(codec) >= 0;
            }

            function isAudioCodecSupported(codec) {
                if (!codec) return null;
                var supported = ['aac', 'mp3', 'mp2', 'opus', 'vorbis', 'flac', 'pcm'];
                if (codec === 'ac3' || codec === 'eac3' || codec === 'dts' || codec === 'truehd') {
                    return false;
                }
                return supported.indexOf(codec) >= 0;
            }

            function shouldDirectStream() {
                var videoOk = isVideoCodecSupported(videoCodec);
                var audioOk = isAudioCodecSupported(audioCodec);
                if (videoOk === false || audioOk === false) return false;
                var unsupportedContainers = ['avi', 'mkv', 'mov', 'wmv', 'flv', 'rmvb', 'rm', 'ts', 'm2ts'];
                return !(container && unsupportedContainers.indexOf(container) >= 0);

            }

            var useTranscode = !shouldDirectStream();
            console.log('[ShortVideo] codec check:', {
                name: name,
                videoCodec: videoCodec || '(unknown)',
                audioCodec: audioCodec || '(unknown)',
                container: container || '(unknown)',
                useTranscode: useTranscode
            });

            function initPlayer() {
                if (initialized) return;
                initialized = true;
                showLoading();
                if (useTranscode && hlsSrc) {
                    if (hls) {
                        console.log('[ShortVideo] prefetched HLS buffer ready, playing directly');
                        v.play().catch(function () {});
                    } else {
                        console.log('[ShortVideo] direct stream skipped (unsupported codec), using HLS transcode directly');
                        triedTranscode = true;
                        fallbackToHls();
                    }
                } else {
                    if (srcLoaded) {
                        console.log('[ShortVideo] prefetched direct stream ready, playing directly');
                        v.play().catch(function () {});
                    } else {
                        v.src = src;
                        v.load();
                    }
                }
            }

            v.addEventListener('playing', function () {
                hideLoading();
                setIcon(btnPlay, 'pause');
            });
            v.addEventListener('pause', function () {
                setIcon(btnPlay, 'play');
            });
            v.addEventListener('waiting', function () {
                showLoading();
            });

            function setIcon(el, name) {
                if (!el) return;
                if (window.lucide && lucide.icons && lucide.icons[name]) {
                    el.innerHTML = lucide.icons[name].toSvg({
                        'stroke-width': 2,
                        'stroke-linecap': 'round',
                        'stroke-linejoin': 'round',
                        fill: 'none'
                    });
                } else {
                    el.innerHTML = '<i data-lucide="' + name + '"></i>';
                    if (window.lucide && lucide.createIcons) {
                        lucide.createIcons();
                    }
                }
            }

            v.addEventListener('timeupdate', function () {
                if (isDraggingProgress) return;
                var pct = v.duration ? (v.currentTime / v.duration) * 100 : 0;
                progressPlayed.style.width = pct + '%';
                progressHandle.style.left = pct + '%';
                timeCurrent.textContent = formatTime(v.currentTime);
            });

            v.addEventListener('loadedmetadata', function () {
                timeTotal.textContent = formatTime(v.duration);
                if (triedTranscode) return;
                var w = v.videoWidth || 0;
                var h = v.videoHeight || 0;
                console.log('[ShortVideo] loadedmetadata: videoWidth=' + w + ', videoHeight=' + h);
                if (w === 0 || h === 0) {
                    triedTranscode = true;
                    console.warn('[ShortVideo] no video track detected (only audio), falling back to HLS transcode');
                    fallbackToHls();
                }
            });

            v.addEventListener('progress', function () {
                if (v.buffered && v.buffered.length > 0 && v.duration) {
                    var bufferedEnd = v.buffered.end(v.buffered.length - 1);
                    var pct = (bufferedEnd / v.duration) * 100;
                    progressBuffer.style.width = pct + '%';
                }
            });

            if (window.Hls) {
                v.addEventListener('hlsBufferUpdated', function () {});
            }

            function destroyPlayer() {
                if (hls) {
                    try {
                        hls.stopLoad();
                        hls.detachMedia();
                        hls.destroy();
                    } catch (e) {}
                    hls = null;
                }
                v.pause();
                v.removeAttribute('src');
                v.load();
                initialized = false;
                triedTranscode = false;
                srcLoaded = false;
                card._prefetched = false;
                if (card._prefetchSlotTaken) {
                    card._prefetchSlotTaken = false;
                    transcodePrefetchDone();
                }
                progressPlayed.style.width = '0%';
                progressBuffer.style.width = '0%';
                progressHandle.style.left = '0%';
                timeCurrent.textContent = '00:00';
                timeTotal.textContent = '00:00';
                showLoading();
            }

            v.addEventListener('error', function () {
                if (!triedTranscode && hlsSrc && hlsSrc !== src) {
                    triedTranscode = true;
                    console.warn('[ShortVideo] direct stream error, falling back to HLS transcode:', src);
                    fallbackToHls();
                }
            });

            v.addEventListener('play', function () {
                if (triedTranscode) return;
                setTimeout(function () {
                    if (triedTranscode) return;
                    var w = v.videoWidth || 0;
                    var h = v.videoHeight || 0;
                    if (w === 0 || h === 0) {
                        triedTranscode = true;
                        console.warn('[ShortVideo] 2s after play still no video, falling back to HLS transcode');
                        fallbackToHls();
                    }
                }, 2000);
            });

            function fallbackToHls() {
                if (hls) {
                    console.log('[ShortVideo] hls already exists, playing directly');
                    v.play().catch(function () {});
                    return;
                }
                v.pause();
                v.removeAttribute('src');

                if (v.canPlayType('application/vnd.apple.mpegurl')) {
                    v.src = hlsSrc;
                    v.load();
                    v.play().catch(function () {});
                    return;
                }

                if (window.Hls && Hls.isSupported()) {
                    var fbRetryCount = 0;
                    var fbMaxRetries = 2;
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: false,
                        backBufferLength: 30,
                        maxBufferLength: 15,
                        maxMaxBufferLength: 30,
                        startFragPrefetch: true
                    });
                    hls.loadSource(hlsSrc);
                    hls.attachMedia(v);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        console.log('[ShortVideo] fallback HLS manifest parsed, playing');
                        v.play().catch(function () {});
                    });
                    hls.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR && fbRetryCount < fbMaxRetries) {
                                fbRetryCount++;
                                console.warn('[ShortVideo] fallback HLS network error, retry ' + fbRetryCount + '/' + fbMaxRetries);
                                setTimeout(function () { hls.startLoad(); }, 1000 * fbRetryCount);
                            } else {
                                console.error('[ShortVideo] fallback HLS fatal error:', data.type, data.details);
                            }
                        } else {
                            console.warn('[ShortVideo] fallback HLS error:', data.type, data.details);
                        }
                    });
                    hls.on(Hls.Events.FRAG_BUFFERED, function () {
                        if (v.buffered && v.buffered.length > 0 && v.duration) {
                            var bufferedEnd = v.buffered.end(v.buffered.length - 1);
                            var pct = (bufferedEnd / v.duration) * 100;
                            progressBuffer.style.width = pct + '%';
                        }
                    });
                } else {
                    console.warn('[ShortVideo] HLS not supported and no hls.js available');
                }
            }

            function showCenterPlayIcon(playState) {
                setIcon(centerAnim, playState ? 'play' : 'pause');
                centerAnim.classList.add('show');
                setTimeout(function () {
                    centerAnim.classList.remove('show');
                }, 300);
            }

            function togglePlay() {
                if (v.paused) {
                    v.play().catch(function () {});
                    showCenterPlayIcon(true);
                } else {
                    v.pause();
                    showCenterPlayIcon(false);
                }
            }

            var lastClickTime = 0;
            card.addEventListener('click', function (e) {
                if (e.target.closest('.actions')) return;
                if (e.target.closest('.controls')) return;

                var now = Date.now();
                if (now - lastClickTime < 300) {
                    e.preventDefault();
                    handleDoubleTap(e);
                    lastClickTime = 0;
                    return;
                }
                lastClickTime = now;

                setTimeout(function () {
                    if (Date.now() - lastClickTime >= 290 && lastClickTime !== 0) {
                        togglePlay();
                        lastClickTime = 0;
                    }
                }, 300);
            });

            function handleDoubleTap(e) {
                toggleLike();
                var heart = document.createElement('div');
                heart.className = 'heart-animation';
                heart.innerHTML = '<i data-lucide="heart" style="fill:#ff4757;color:#ff4757;width:80px;height:80px;"></i>';
                var rect = card.getBoundingClientRect();
                heart.style.left = (e.clientX - rect.left) + 'px';
                heart.style.top = (e.clientY - rect.top) + 'px';
                heart.style.transform = 'translate(-50%, -50%)';
                card.appendChild(heart);
                if (window.lucide && lucide.createIcons) {
                    lucide.createIcons({ root: heart });
                }
                setTimeout(function () { heart.remove(); }, 800);
            }

            function toggleLike() {
                isLiked = !isLiked;
                if (isLiked) {
                    likeCount++;
                    likeIcon.classList.add('liked');
                    var heartSvg = likeIcon.querySelector('.lucide-heart');
                    if (heartSvg) heartSvg.style.fill = 'currentColor';
                } else {
                    likeCount--;
                    likeIcon.classList.remove('liked');
                    var heartSvg = likeIcon.querySelector('.lucide-heart');
                    if (heartSvg) heartSvg.style.fill = 'none';
                }
                likeCountEl.textContent = formatLikeCount(likeCount);
            }

            likeIcon.addEventListener('click', function (e) {
                e.stopPropagation();
                toggleLike();
            });

            btnPlay.addEventListener('click', function (e) {
                e.stopPropagation();
                togglePlay();
            });

            function toggleMute() {
                globalMuted = !globalMuted;
                syncMuteAll();
            }

            muteIcon.addEventListener('click', function (e) {
                e.stopPropagation();
                toggleMute();
            });

            function updateVolumeUI() {
                var icon = globalMuted ? 'volume-x' : 'volume-2';
                setIcon(muteIcon, icon);
            }

            progressContainer.addEventListener('mousedown', function (e) {
                e.stopPropagation();
                startDrag(e);
            });

            progressContainer.addEventListener('touchstart', function (e) {
                e.stopPropagation();
                startDrag(e.touches[0]);
            });

            function startDrag(e) {
                isDraggingProgress = true;
                progressContainer.classList.add('dragging');
                updateProgressFromEvent(e);
                document.addEventListener('mousemove', onDragMove);
                document.addEventListener('mouseup', onDragEnd);
                document.addEventListener('touchmove', onTouchMove);
                document.addEventListener('touchend', onTouchEnd);
            }

            function onDragMove(e) {
                if (!isDraggingProgress) return;
                updateProgressFromEvent(e);
            }

            function onTouchMove(e) {
                if (!isDraggingProgress) return;
                updateProgressFromEvent(e.touches[0]);
            }

            function onDragEnd(e) {
                if (!isDraggingProgress) return;
                updateProgressFromEvent(e);
                finishDrag();
            }

            function onTouchEnd(e) {
                if (!isDraggingProgress) return;
                finishDrag();
            }

            function finishDrag() {
                isDraggingProgress = false;
                progressContainer.classList.remove('dragging');
                document.removeEventListener('mousemove', onDragMove);
                document.removeEventListener('mouseup', onDragEnd);
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            }

            function updateProgressFromEvent(e) {
                var rect = progressContainer.getBoundingClientRect();
                var pct = (e.clientX - rect.left) / rect.width;
                pct = Math.max(0, Math.min(1, pct));
                progressPlayed.style.width = (pct * 100) + '%';
                progressHandle.style.left = (pct * 100) + '%';
                if (v.duration) {
                    var targetTime = pct * v.duration;
                    v.currentTime = targetTime;
                    timeCurrent.textContent = formatTime(targetTime);
                }
            }

            rateBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                rateMenu.classList.toggle('show');
            });

            var rateOptions = rateMenu.querySelectorAll('.rate-option');
            rateOptions.forEach(function (opt) {
                opt.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var rate = parseFloat(opt.dataset.rate);
                    playRate = rate;
                    v.playbackRate = rate;
                    rateBtn.textContent = rate + 'x';
                    rateOptions.forEach(function (o) { o.classList.remove('active'); });
                    opt.classList.add('active');
                    rateMenu.classList.remove('show');
                });
            });

            document.addEventListener('click', function (e) {
                if (!e.target.closest('.rate-menu') && !e.target.closest('.playback-rate')) {
                    rateMenu.classList.remove('show');
                }
            });

            card._initPlayer = initPlayer;
            card._destroyPlayer = destroyPlayer;
            card._video = v;
            card._useTranscode = useTranscode;
            card._hlsSrc = hlsSrc;
            card._src = src;
            card._prefetched = false;
            card._prefetchSlotTaken = false;

            card._prefetch = function () {
                if (card._prefetched) return;
                card._prefetched = true;
                console.log('[ShortVideo] prefetching (real buffer):', name);

                if (useTranscode && hlsSrc) {
                    var doPrefetch = function () {
                        if (!card._prefetched) {
                            console.log('[ShortVideo] prefetch cancelled (card destroyed) for', name);
                            transcodePrefetchDone();
                            return;
                        }
                        card._prefetchSlotTaken = true;
                        if (window.Hls && Hls.isSupported()) {
                            var retryCount = 0;
                            var maxRetries = 2;
                            hls = new Hls({
                                enableWorker: true,
                                lowLatencyMode: false,
                                backBufferLength: 30,
                                maxBufferLength: 15,
                                maxMaxBufferLength: 30,
                                startFragPrefetch: true
                            });
                            hls.loadSource(hlsSrc);
                            hls.attachMedia(v);
                            triedTranscode = true;

                            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                                console.log('[ShortVideo] prefetch: manifest parsed, buffering for', name);
                                card._prefetchSlotTaken = false;
                                transcodePrefetchDone();
                            });

                            var fragCount = 0;
                            hls.on(Hls.Events.FRAG_LOADED, function (event, data) {
                                fragCount++;
                                if (fragCount <= 3) {
                                    console.log('[ShortVideo] prefetch: frag ' + fragCount + ' loaded for', name);
                                }
                            });

                            hls.on(Hls.Events.ERROR, function (event, data) {
                                if (data.fatal) {
                                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR && retryCount < maxRetries) {
                                        retryCount++;
                                        console.warn('[ShortVideo] prefetch network error, retry ' + retryCount + '/' + maxRetries + ' for', name);
                                        setTimeout(function () { hls.startLoad(); }, 1000 * retryCount);
                                    } else {
                                        console.warn('[ShortVideo] prefetch fatal HLS error, destroying:', data.type, data.details, 'for', name);
                                        try { hls.destroy(); } catch (e) {}
                                        hls = null;
                                        card._prefetched = false;
                                        card._prefetchSlotTaken = false;
                                        triedTranscode = false;
                                        transcodePrefetchDone();
                                    }
                                } else {
                                    console.warn('[ShortVideo] prefetch HLS error:', data.type, data.details, 'for', name);
                                }
                            });
                        } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                            v.src = hlsSrc;
                            v.preload = 'auto';
                            v.load();
                            triedTranscode = true;
                            card._prefetchSlotTaken = false;
                            transcodePrefetchDone();
                        } else {
                            card._prefetchSlotTaken = false;
                            transcodePrefetchDone();
                        }
                    };
                    scheduleTranscodePrefetch(doPrefetch);
                } else {
                    v.src = src;
                    v.preload = 'auto';
                    v.load();
                    srcLoaded = true;
                }
            };

            v.muted = globalMuted;
            v.volume = globalVolume;
            updateVolumeUI();

            btnPlay._setIcon = function(name) { setIcon(btnPlay, name); };
            muteIcon._setIcon = function(name) { setIcon(muteIcon, name); };

            feed.appendChild(card);

            if (window.lucide && lucide.createIcons) {
                lucide.createIcons({ root: card });
                var heartSvg = likeIcon.querySelector('.lucide-heart');
                if (heartSvg && isLiked) heartSvg.style.fill = 'currentColor';
            }
        }

        var snapTimer;
        feed.addEventListener('scroll', function () {
            clearTimeout(snapTimer);
            snapTimer = setTimeout(function () {
                playVisible();
                if (feed.scrollTop + feed.clientHeight > feed.scrollHeight - feed.clientHeight) {
                    loadBatch();
                }
            }, 120);
        });

        function playVisible() {
            var cards = feed.querySelectorAll('.card');
            var center = feed.scrollTop + feed.clientHeight / 2;
            var visibleIndex = -1;
            for (var i = 0; i < cards.length; i++) {
                var card = cards[i];
                var top = card.offsetTop;
                var bottom = top + card.offsetHeight;
                if (center >= top && center < bottom) {
                    visibleIndex = i;
                    break;
                }
            }

            cards.forEach(function (card, i) {
                var v = card._video || card.querySelector('video');
                var isVisible = i === visibleIndex;
                if (v) {
                    v.muted = globalMuted;
                    v.volume = globalVolume;
                }
                if (isVisible) {
                    if (card._initPlayer) card._initPlayer();
                    v.play().catch(function () {});
                } else {
                    v.pause();
                    if (Math.abs(i - visibleIndex) > 3 && card._destroyPlayer) {
                        card._destroyPlayer();
                    }
                }
            });

            if (visibleIndex >= 0) {
                for (var j = 1; j <= 3; j++) {
                    var nextIdx = visibleIndex + j;
                    if (nextIdx < cards.length && cards[nextIdx]._prefetch) {
                        cards[nextIdx]._prefetch();
                    }
                }
                var remaining = cards.length - visibleIndex - 1;
                if (remaining <= 3 && !isLoading) {
                    console.log('[ShortVideo] 到达倒数第3条，提前加载下一批');
                    loadBatch();
                }
            }
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                e.preventDefault();
                var step = feed.clientHeight;
                feed.scrollBy({ top: e.key === 'ArrowDown' ? step : -step, behavior: 'smooth' });
            }
        });

        loadBatch();

        if (window.lucide && lucide.createIcons) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
