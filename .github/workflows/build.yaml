name: Build and Release Plugins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ==================== FileUpload ====================
      - name: Build FileUpload
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish Jellyfin.Plugin.FileUpload/Jellyfin.Plugin.FileUpload.csproj \
            -c Release \
            -p:Version=${VERSION} \
            -o artifacts-fileupload

      - name: Package FileUpload
        id: pkg_fileupload
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_NAME="jellyfin-plugin-fileupload_v${VERSION}.zip"
          mkdir -p package-fileupload
          cp artifacts-fileupload/Jellyfin.Plugin.FileUpload.dll package-fileupload/
          cp artifacts-fileupload/Jellyfin.Plugin.FileUpload.pdb package-fileupload/
          cp Jellyfin.Plugin.FileUpload/build.yaml package-fileupload/
          cd package-fileupload && zip -r "../${PKG_NAME}" .
          cd ..
          SHA1=$(sha1sum "${PKG_NAME}" | awk '{print $1}')
          echo "pkg_name=${PKG_NAME}" >> $GITHUB_OUTPUT
          echo "sha1=${SHA1}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # ==================== ShortVideo ====================
      - name: Read ShortVideo version
        id: sv_version
        run: |
          SV_VERSION=$(grep -oP '<Version>\K[^<]+' Jellyfin.Plugin.ShortVideo/Jellyfin.Plugin.ShortVideo.csproj)
          echo "version=${SV_VERSION}" >> $GITHUB_OUTPUT

      - name: Build ShortVideo frontend
        run: |
          cd Jellyfin.Plugin.ShortVideo/Web/react-app
          npm install
          npx vite build

      - name: Build ShortVideo backend
        run: |
          dotnet publish Jellyfin.Plugin.ShortVideo/Jellyfin.Plugin.ShortVideo.csproj \
            -c Release \
            -o artifacts-shortvideo

      - name: Package ShortVideo
        id: pkg_shortvideo
        run: |
          SV_VERSION="${{ steps.sv_version.outputs.version }}"
          PKG_NAME="jellyfin-plugin-shortvideo_v${SV_VERSION}.zip"
          mkdir -p package-shortvideo
          cp artifacts-shortvideo/Jellyfin.Plugin.ShortVideo.dll package-shortvideo/
          cp artifacts-shortvideo/Jellyfin.Plugin.ShortVideo.pdb package-shortvideo/
          cp Jellyfin.Plugin.ShortVideo/build.yaml package-shortvideo/
          cd package-shortvideo && zip -r "../${PKG_NAME}" .
          cd ..
          SHA1=$(sha1sum "${PKG_NAME}" | awk '{print $1}')
          echo "pkg_name=${PKG_NAME}" >> $GITHUB_OUTPUT
          echo "sha1=${SHA1}" >> $GITHUB_OUTPUT
          echo "version=${SV_VERSION}" >> $GITHUB_OUTPUT

      # ==================== Upload artifacts ====================
      - name: Upload FileUpload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-plugin-fileupload
          path: ${{ steps.pkg_fileupload.outputs.pkg_name }}

      - name: Upload ShortVideo artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-plugin-shortvideo
          path: ${{ steps.pkg_shortvideo.outputs.pkg_name }}

      # ==================== Create Release ====================
      - name: Create Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg_fileupload.outputs.pkg_name }}
            ${{ steps.pkg_shortvideo.outputs.pkg_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}

      # ==================== Recalculate checksum from Release assets ====================
      - name: Recalculate checksum from Release
        id: release_checksum
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FU_PKG="${{ steps.pkg_fileupload.outputs.pkg_name }}"
          SV_PKG="${{ steps.pkg_shortvideo.outputs.pkg_name }}"

          FU_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${TAG_VERSION}/${FU_PKG}"
          SV_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${TAG_VERSION}/${SV_PKG}"

          echo "Downloading ${FU_URL} ..."
          curl -sL -o "/tmp/${FU_PKG}" "${FU_URL}"
          FU_SHA1=$(sha1sum "/tmp/${FU_PKG}" | awk '{print $1}')
          echo "fu_sha1=${FU_SHA1}"
          echo "fu_sha1=${FU_SHA1}" >> $GITHUB_OUTPUT

          echo "Downloading ${SV_URL} ..."
          curl -sL -o "/tmp/${SV_PKG}" "${SV_URL}"
          SV_SHA1=$(sha1sum "/tmp/${SV_PKG}" | awk '{print $1}')
          echo "sv_sha1=${SV_SHA1}"
          echo "sv_sha1=${SV_SHA1}" >> $GITHUB_OUTPUT

      # ==================== Update and commit manifest.json ====================
      - name: Update and commit manifest.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FU_VERSION="${{ steps.pkg_fileupload.outputs.version }}"
          FU_SHA1="${{ steps.release_checksum.outputs.fu_sha1 }}"
          FU_PKG="${{ steps.pkg_fileupload.outputs.pkg_name }}"
          SV_VERSION="${{ steps.pkg_shortvideo.outputs.version }}"
          SV_SHA1="${{ steps.release_checksum.outputs.sv_sha1 }}"
          SV_PKG="${{ steps.pkg_shortvideo.outputs.pkg_name }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FU_URL="https://github.com/YBin666/jellyfin-custom/releases/download/v${TAG_VERSION}/${FU_PKG}"
          SV_URL="https://github.com/YBin666/jellyfin-custom/releases/download/v${TAG_VERSION}/${SV_PKG}"

          # 1. 生成新的 manifest.json 内容（在当前 detached HEAD 工作区）
          python3 <<EOF
          import json

          with open('manifest.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          timestamp = "${TIMESTAMP}"
          tag_version = "${TAG_VERSION}"

          def normalize_version(v):
              parts = v.split('.')
              while len(parts) < 4:
                  parts.append('0')
              return '.'.join(parts)

          fu_ver = normalize_version("${FU_VERSION}")
          sv_ver = normalize_version("${SV_VERSION}")

          fu_new = {
              "version": fu_ver,
              "changelog": f"版本 {tag_version}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": "${FU_URL}",
              "checksum": "${FU_SHA1}",
              "timestamp": timestamp
          }
          for plugin in data:
              if plugin["guid"] == "e8b1c4d7-3a5e-4f8a-9c2b-6d7e8f9a0b1c":
                  versions = [v for v in plugin["versions"] if v["version"] != fu_ver]
                  versions.insert(0, fu_new)
                  plugin["versions"] = versions
                  break

          sv_new = {
              "version": sv_ver,
              "changelog": f"版本 {sv_ver}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": "${SV_URL}",
              "checksum": "${SV_SHA1}",
              "timestamp": timestamp
          }
          found = False
          for plugin in data:
              if plugin["guid"] == "7f3a9c2e-1b4d-4e6a-8f0b-2c5d7e9a1b3f":
                  versions = [v for v in plugin["versions"] if v["version"] != sv_ver]
                  versions.insert(0, sv_new)
                  plugin["versions"] = versions
                  found = True
                  break
          if not found:
              data.append({
                  "guid": "7f3a9c2e-1b4d-4e6a-8f0b-2c5d7e9a1b3f",
                  "name": "ShortVideo",
                  "description": "抖音式刷短视频入口，从 Jellyfin 媒体库中筛选短时长视频，提供竖屏全屏上下滑动播放体验",
                  "overview": "在主界面加入短视频入口，进入竖屏全屏播放器，上下滑动切换下一条短视频。",
                  "owner": "YBin666",
                  "category": "General",
                  "versions": [sv_new]
              })

          with open('manifest.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

          # 2. 保存修改后的 manifest.json 到临时文件
          cp manifest.json /tmp/manifest.json.new

          # 3. 切换到 main 分支（解决 detached HEAD 问题）
          git fetch origin main
          git checkout main

          # 4. 用新的 manifest.json 覆盖
          cp /tmp/manifest.json.new manifest.json

          # 5. 提交并推送
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest.json for v${GITHUB_REF_NAME#v}" || echo "No changes to commit"
          git push origin main
